<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ali Kahi — Lifeline Group of Companies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0a0a;
    --red:#e21a23;
    --white:#f4f4f2;
    --muted:#8f8f8f;
    --card-w: min(90vw, 420px);
    --card-h: calc(var(--card-w) * 600 / 1050);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--black);
    color:var(--white);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px 20px 40px;
    position:relative;
  }


  .eyebrow{
    font-family:'Oswald',sans-serif;
    font-weight:500;
    letter-spacing:0.02em;
    font-size:16px;
    color:var(--white);
    margin-bottom:22px;
    text-align:center;
    z-index:1;
  }

  .stage{
    perspective:1800px;
    width:var(--card-w);
    height:var(--card-h);
    z-index:1;
  }

  .card{
    position:relative;
    width:100%;
    height:100%;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:transform 0.7s cubic-bezier(.22,.68,0,1.01);
  }
  .card.flipped{ transform:rotateY(180deg); }

  .face{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    background:var(--black);
  }
  .face img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
  }
  .face.back{ transform:rotateY(180deg); }

  /* heartbeat trace that draws once around the card border on load */
  .trace{
    position:absolute;
    inset:-1px;
    border-radius:8px;
    pointer-events:none;
  }
  .trace rect{
    fill:none;
    stroke:var(--red);
    stroke-width:2;
    stroke-dasharray:1600;
    stroke-dashoffset:1600;
    animation:draw 1.6s ease-out forwards;
    animation-delay:0.15s;
  }
  @keyframes draw{ to{ stroke-dashoffset:0; } }

  .hint{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:20px;
    font-family:'Oswald',sans-serif;
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--muted);
    z-index:1;
    user-select:none;
  }
  .hint svg{ width:20px; height:14px; }
  .hint path{
    fill:none;
    stroke:var(--red);
    stroke-width:1.6;
    stroke-linejoin:round;
    stroke-linecap:round;
  }
  .pulse-line{
    stroke-dasharray:60;
    stroke-dashoffset:60;
    animation:pulse-run 2.4s ease-in-out infinite;
  }
  @keyframes pulse-run{
    0%{ stroke-dashoffset:60; }
    45%{ stroke-dashoffset:0; }
    100%{ stroke-dashoffset:-60; }
  }

  .cta{
    margin-top:28px;
    width:var(--card-w);
    max-width:420px;
    z-index:1;
  }

  button.add-contact{
    width:100%;
    padding:16px 20px;
    background:var(--red);
    color:var(--white);
    border:none;
    border-radius:8px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    position:relative;
    overflow:hidden;
    transition:transform 0.15s ease, background 0.2s ease;
  }
  button.add-contact:hover{ background:#c9141c; }
  button.add-contact:active{ transform:scale(0.98); }
  button.add-contact svg{ width:18px; height:18px; flex-shrink:0; }

  .status{
    margin-top:14px;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    color:var(--muted);
    text-align:center;
    min-height:16px;
    z-index:1;
  }
  .status.show{ color:var(--white); }

  footer{
    margin-top:34px;
    font-family:'Inter',sans-serif;
    font-size:11px;
    color:#4a4a4a;
    letter-spacing:0.04em;
    z-index:1;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:transform 0.01s linear; }
    .trace rect{ animation:none; stroke-dashoffset:0; }
    .pulse-line{ animation:none; stroke-dashoffset:0; }
  }
</style>
</head>

<div class="hint" id="hint">
  <svg viewBox="0 0 60 20"><path class="pulse-line" d="M0,10 L18,10 L22,3 L27,17 L31,10 L60,10"/></svg>
  <span>Tap card to flip</span>
</div>

<div class="cta">
  <button class="add-contact" id="addContactBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
      <line x1="19" y1="8" x2="19" y2="14"></line>
      <line x1="16" y1="11" x2="22" y2="11"></line>
    </svg>
    Add to Contacts
  </button>
  <div class="status" id="status"></div>
</div>

<footer>Lifeline Group of Companies</footer>

<script>
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');

  function toggleFlip(){
    card.classList.toggle('flipped');
    hint.querySelector('span').textContent = card.classList.contains('flipped') ? 'Tap card to flip back' : 'Tap card to flip';
  }
  card.addEventListener('click', toggleFlip);
  card.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggleFlip(); }
  });

  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Kahi;Ali;;;',
    'FN:Ali Kahi',
    'ORG:Lifeline Group of Companies',
    'TITLE:President & CEO',
    'TEL;TYPE=CELL,VOICE:+16479544921',
    'EMAIL;TYPE=INTERNET,WORK:ali.k@lifelinefireprotection.com',
    'URL:https://lifelinefireprotection.com',
    'NOTE:Electric | Fire Protection | Pipe Fabrication | Design & Engineering | Monitoring & Security. Service areas: GTA, Barrie, Hamilton.',
    'END:VCARD'
  ].join('\r\n');

  document.getElementById('addContactBtn').addEventListener('click', () => {
    // Navigate directly to a vCard data URI (no "download" attribute, no forced save).
    // Mobile browsers that recognize text/vcard — Safari on iOS in particular —
    // open the native "Add Contact" card screen right away instead of saving a file.
    const dataUri = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcard);
    window.location.href = dataUri;

    const status = document.getElementById('status');
    status.textContent = 'Tap "Add Contact" (or "Create New Contact") when it appears.';
    status.classList.add('show');
  });
</script>
